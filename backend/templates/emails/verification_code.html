{# 인증코드 이메일 공통 템플릿 — 회원가입 / 비밀번호 재설정 양쪽에서 사용 #}
<div style="background-color: #ffffff; padding: 32px 16px;">
<div style="font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 40px 32px; background-color: #ffffff; border: 2px solid #c8dfd1; border-radius: 32px; text-align: center;">
    <img src="cid:poli_logo"
         alt="Poli" width="64" style="display: block; width: 64px; height: auto; margin: 0 auto 16px;" />
    <h2 style="color: #1e5c32; margin: 0 0 20px; font-size: 20px;">{{ title }}</h2>
    <p style="margin: 0 0 20px;">아래 인증 코드를 입력해주세요.</p>
    <div style="font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #1e5c32; margin: 0 0 20px;">
        {{ code }}
    </div>
    <p style="color: #555; font-size: 14px; margin: 0;">유효 시간은 3분입니다.</p>
</div>
</div>
