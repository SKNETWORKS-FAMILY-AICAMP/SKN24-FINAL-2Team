{% extends 'base.html' %}
{% load static %}

{% block title %}비밀번호 찾기 — PoliCity{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/password_find.css' %}">
{% endblock %}

{% block content %}

<main class="password-find-page">

  <div class="sky-clouds" aria-hidden="true"></div>

  <section class="password-find-wrap">
    <div class="password-find-card">

      <div class="find-badge">
        <img src="{% static 'assets/logo_1.png' %}" alt="PoliCity">
      </div>

      <h1 class="password-find-title">
        <span class="spark">✦</span>
        비밀번호 찾기
        <span class="spark">✦</span>
      </h1>

      <p class="password-find-desc">
        가입한 이메일로 인증번호를 받아<br>
        비밀번호 재설정을 진행할 수 있습니다.
      </p>

      <form class="password-find-form" method="post">
        {% csrf_token %}

        <!-- 이메일 -->
        <div class="find-field">
          <label for="email">이메일</label>
          <div class="find-email-row">
            <input
              id="email"
              name="email"
              type="email"
              placeholder="가입한 이메일을 입력하세요"
              autocomplete="email"
            >
            <button type="button" id="sendFindCodeBtn" class="find-send-btn" disabled>
              인증번호 전송
            </button>
          </div>
        </div>

        <!-- 인증번호 -->
        <div class="find-field">
          <label for="findCode">인증번호</label>
          <div class="find-code-row">
            <input
              id="findCode"
              name="find_code"
              type="text"
              placeholder="인증번호를 입력해주세요"
              maxlength="6"
              disabled
            >
            <button type="button" id="checkFindCodeBtn" class="find-check-btn" disabled>
              인증번호 확인
            </button>
          </div>
        </div>

        <p id="findMessage" class="find-message"></p>

        <button type="button" id="findNextBtn" class="find-next-btn" disabled>
          다음
        </button>

      </form>

    </div>
  </section>

</main>

<div class="ground" aria-hidden="true">
  <img class="plaza" src="{% static 'assets/plaza_trim.png' %}" alt="">
</div>

{% endblock %}

{% block script %}
<script>
  window.POLICITY_CLOUD_SRC = "{% static 'assets/cloud.png' %}";
</script>
<script src="{% static 'js/password_find.js' %}"></script>
{% endblock %}
