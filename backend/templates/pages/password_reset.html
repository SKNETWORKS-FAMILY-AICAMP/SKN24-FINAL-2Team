{% extends 'base.html' %}
{% load static %}

{% block title %}비밀번호 재설정 — PoliCity{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/password_reset.css' %}">
{% endblock %}

{% block content %}

<main class="password-reset-page">

  <div class="sky-clouds" aria-hidden="true"></div>

  <section class="password-reset-wrap">
    <div class="password-reset-card">

      <div class="reset-badge">
        <img src="{% static 'assets/logo_1.png' %}" alt="PoliCity">
      </div>

      <h1 class="password-reset-title">
        <span class="spark">✦</span>
        비밀번호 재설정
        <span class="spark">✦</span>
      </h1>

      <p class="password-reset-desc">
        새 비밀번호를 입력하고<br>
        다시 한 번 확인해주세요.
      </p>

      <form class="password-reset-form" method="post">
        {% csrf_token %}

        <!-- 새 비밀번호 -->
        <div class="reset-field">
          <label for="newPassword">새 비밀번호</label>
          <div class="reset-input-wrap">
            <input
              id="newPassword"
              name="new_password"
              type="password"
              placeholder="비밀번호를 입력해주세요"
              autocomplete="new-password"
            >
            <button type="button" class="reset-eye" data-target="newPassword" aria-label="비밀번호 보기">
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="reset-field">
          <label for="confirmPassword">비밀번호 확인</label>
          <div class="reset-input-wrap">
            <input
              id="confirmPassword"
              name="confirm_password"
              type="password"
              placeholder="비밀번호를 재입력해주세요"
              autocomplete="new-password"
            >
            <button type="button" class="reset-eye" data-target="confirmPassword" aria-label="비밀번호 보기">
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
        </div>

        <p id="resetMessage" class="reset-message"></p>

        <button type="submit" id="resetSubmitBtn" class="reset-submit" disabled>
          확인
        </button>

      </form>

    </div>
  </section>

</main>

<div class="ground" aria-hidden="true">
  <img class="plaza" src="{% static 'assets/plaza_trim.png' %}" alt="">
</div>

{% endblock %}

{% block script %}
<script>
  window.POLICITY_CLOUD_SRC = "{% static 'assets/cloud.png' %}";
</script>
<script src="{% static 'js/password_reset.js' %}"></script>
<script>
  document.querySelectorAll(".reset-eye").forEach(function (btn) {
    btn.addEventListener("click", function () {
      const input = document.getElementById(btn.dataset.target);
      const icon  = btn.querySelector("i");
      if (!input || !icon) return;
      const isPw = input.type === "password";
      input.type = isPw ? "text" : "password";
      icon.className = isPw ? "bi bi-eye" : "bi bi-eye-slash";
    });
  });
</script>
{% endblock %}
